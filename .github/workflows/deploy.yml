name: Deploy dbt

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: dbt-${{ inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      target: ${{ steps.env.outputs.target }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            DEPLOY_ENV="prod"
          else
            DEPLOY_ENV="dev"
          fi
          echo "environment=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "target=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    env:
      DBT_PROFILES_DIR: .
      DBT_TARGET: ${{ needs.resolve.outputs.target }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      DBT_ATHENA_DATABASE: ${{ vars.DBT_ATHENA_DATABASE || 'awsdatacatalog' }}
      DBT_ATHENA_STAGING_DIR: ${{ vars.DBT_ATHENA_STAGING_DIR }}
      DBT_ATHENA_DATA_DIR: ${{ vars.DBT_ATHENA_DATA_DIR }}
      DBT_DEV_SCHEMA: ${{ vars.DBT_DEV_SCHEMA || 'swedish_mortgages_dev' }}
      DBT_PROD_SCHEMA: ${{ vars.DBT_PROD_SCHEMA || 'swedish_mortgages_prod' }}
      SWEDISH_FINANCE_RAW_SCHEMA: ${{ vars.SWEDISH_FINANCE_RAW_SCHEMA || 'swedish_finance' }}
      DBT_THREADS: ${{ vars.DBT_THREADS || '4' }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate required environment
        run: |
          test -n "$DBT_ATHENA_STAGING_DIR"
          test -n "$DBT_ATHENA_DATA_DIR"
          test -n "$AWS_ROLE_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Parse and validate contracts
        run: |
          dbt parse
          python scripts/validate_app_contracts.py

      - name: Source freshness
        run: dbt source freshness --select source:swedish_finance

      - name: Build dbt project
        run: dbt build

      - name: Generate docs artifacts
        run: dbt docs generate

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ needs.resolve.outputs.environment }}
          path: |
            target/manifest.json
            target/catalog.json
            target/run_results.json
            target/sources.json
