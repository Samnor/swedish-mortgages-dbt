name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: .
      DBT_TARGET: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: dbt parse
        run: dbt parse

      - name: App contract validation
        run: python scripts/validate_app_contracts.py

      - name: SQLFluff lint
        run: sqlfluff lint --ignore=templating --templater jinja models
