name: Ingest Raw Sources

on:
  schedule:
    - cron: "15 7 * * 1-5"
    - cron: "45 7 15 * *"
  workflow_dispatch:
    inputs:
      source:
        description: Source to ingest
        required: true
        default: daily
        type: choice
        options:
          - daily
          - all
          - se-rates
          - bank-rates
          - scb
      environment:
        description: GitHub environment with AWS/S3 variables
        required: true
        default: prod
        type: choice
        options:
          - dev
          - prod
      run_dbt_build:
        description: Run source freshness and dbt build after ingestion
        required: true
        default: true
        type: boolean

concurrency:
  group: ingest-${{ inputs.environment || 'prod' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      source: ${{ steps.env.outputs.source }}
      run_dbt_build: ${{ steps.env.outputs.run_dbt_build }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ inputs.environment }}"
            SOURCE="${{ inputs.source }}"
            RUN_DBT_BUILD="${{ inputs.run_dbt_build }}"
          else
            DEPLOY_ENV="prod"
            if [ "${{ github.event.schedule }}" = "45 7 15 * *" ]; then
              SOURCE="scb"
            else
              SOURCE="daily"
            fi
            RUN_DBT_BUILD="true"
          fi
          echo "environment=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "run_dbt_build=$RUN_DBT_BUILD" >> "$GITHUB_OUTPUT"

  ingest:
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    env:
      DBT_PROFILES_DIR: .
      DBT_TARGET: ${{ needs.resolve.outputs.environment }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      DBT_ATHENA_DATABASE: ${{ vars.DBT_ATHENA_DATABASE || 'awsdatacatalog' }}
      DBT_ATHENA_STAGING_DIR: ${{ vars.DBT_ATHENA_STAGING_DIR }}
      DBT_ATHENA_DATA_DIR: ${{ vars.DBT_ATHENA_DATA_DIR }}
      DBT_DEV_SCHEMA: ${{ vars.DBT_DEV_SCHEMA || 'swedish_mortgages_dev' }}
      DBT_PROD_SCHEMA: ${{ vars.DBT_PROD_SCHEMA || 'swedish_mortgages_prod' }}
      DBT_THREADS: ${{ vars.DBT_THREADS || '4' }}
      SWEDISH_FINANCE_RAW_SCHEMA: ${{ vars.SWEDISH_FINANCE_RAW_SCHEMA || 'swedish_finance' }}
      SWEDISH_MORTGAGES_ATHENA_DATABASE: ${{ vars.SWEDISH_FINANCE_RAW_SCHEMA || 'swedish_finance' }}
      SWEDISH_MORTGAGES_S3_BUCKET: ${{ vars.SWEDISH_MORTGAGES_S3_BUCKET }}
      SWEDISH_MORTGAGES_SE_RATES_PREFIX: ${{ vars.SWEDISH_MORTGAGES_SE_RATES_PREFIX || 'se-rates' }}
      SWEDISH_MORTGAGES_BANK_RATES_PREFIX: ${{ vars.SWEDISH_MORTGAGES_BANK_RATES_PREFIX || 'bank-listed-rates' }}
      SWEDISH_MORTGAGES_SCB_PREFIX: ${{ vars.SWEDISH_MORTGAGES_SCB_PREFIX || 'scb-mortgage-rates' }}
      SWEDISH_MORTGAGES_SE_RATES_ATHENA_STAGING: ${{ vars.SWEDISH_MORTGAGES_SE_RATES_ATHENA_STAGING || vars.DBT_ATHENA_STAGING_DIR }}
      SWEDISH_MORTGAGES_BANK_RATES_ATHENA_STAGING: ${{ vars.SWEDISH_MORTGAGES_BANK_RATES_ATHENA_STAGING || vars.DBT_ATHENA_STAGING_DIR }}
      SWEDISH_MORTGAGES_SCB_ATHENA_STAGING: ${{ vars.SWEDISH_MORTGAGES_SCB_ATHENA_STAGING || vars.DBT_ATHENA_STAGING_DIR }}
      SWEDISH_MORTGAGES_STATE_DIR: /tmp/swedish-mortgages-state
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate required environment
        run: |
          test -n "$AWS_ROLE_ARN"
          test -n "$SWEDISH_MORTGAGES_S3_BUCKET"
          if [ "${{ needs.resolve.outputs.run_dbt_build }}" = "true" ]; then
            test -n "$DBT_ATHENA_STAGING_DIR"
            test -n "$DBT_ATHENA_DATA_DIR"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ingest raw source data
        run: python scripts/run_ingestion.py --source "${{ needs.resolve.outputs.source }}"

      - name: Source freshness
        if: needs.resolve.outputs.run_dbt_build == 'true'
        run: dbt source freshness --select source:swedish_finance

      - name: Build dbt project
        if: needs.resolve.outputs.run_dbt_build == 'true'
        run: dbt build
