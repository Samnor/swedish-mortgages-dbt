swedish_mortgages:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: athena
      region_name: "{{ env_var('AWS_REGION', 'eu-north-1') }}"
      s3_staging_dir: "{{ env_var('DBT_ATHENA_STAGING_DIR', 's3://example-athena-results/dbt-results/') }}"
      s3_data_dir: "{{ env_var('DBT_ATHENA_DATA_DIR', 's3://example-data-lake/dbt/') }}"
      database: "{{ env_var('DBT_ATHENA_DATABASE', 'awsdatacatalog') }}"
      schema: "{{ env_var('DBT_DEV_SCHEMA', 'swedish_mortgages_dev') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
    ci:
      type: athena
      region_name: "{{ env_var('AWS_REGION', 'eu-north-1') }}"
      s3_staging_dir: "{{ env_var('DBT_ATHENA_STAGING_DIR', 's3://example-athena-results/dbt-results/') }}"
      s3_data_dir: "{{ env_var('DBT_ATHENA_DATA_DIR', 's3://example-data-lake/dbt/') }}"
      database: "{{ env_var('DBT_ATHENA_DATABASE', 'awsdatacatalog') }}"
      schema: "swedish_mortgages_ci_{{ env_var('GITHUB_RUN_ID', env_var('CI_RUN_ID', 'local')) }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
    prod:
      type: athena
      region_name: "{{ env_var('AWS_REGION', 'eu-north-1') }}"
      s3_staging_dir: "{{ env_var('DBT_ATHENA_STAGING_DIR', 's3://example-athena-results/dbt-results/') }}"
      s3_data_dir: "{{ env_var('DBT_ATHENA_DATA_DIR', 's3://example-data-lake/dbt/') }}"
      database: "{{ env_var('DBT_ATHENA_DATABASE', 'awsdatacatalog') }}"
      schema: "{{ env_var('DBT_PROD_SCHEMA', 'swedish_mortgages_prod') }}"
      threads: "{{ env_var('DBT_THREADS', '8') | int }}"
