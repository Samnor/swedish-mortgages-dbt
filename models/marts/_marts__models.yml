version: 2

models:
  - name: rates_daily
    description: >
      Wide-format daily rates with one row per date. Mortgage-bond columns use
      Riksbanken/Refinitiv Stadshypotek CAISSE series, and covered-bond spreads
      are Swedish mortgage-bond market proxies over equivalent government bonds.
    columns:
      - name: rate_date
        description: Calendar date.
        tests:
          - not_null
      - name: spread_2y
        description: 2Y Stadshypotek CAISSE mortgage-bond proxy yield minus 2Y government-bond yield.
      - name: spread_5y
        description: 5Y Stadshypotek CAISSE mortgage-bond proxy yield minus 5Y government-bond yield.
      - name: stibor_policy_spread_3m
        description: 3M STIBOR minus the policy rate.
      - name: swestr_policy_spread_3m
        description: 3M compounded SWESTR average minus the policy rate.

  - name: bank_margin_analysis
    description: >
      Latest listed bank rates with estimated gross margins over a stylized
      Swedish mortgage-bond market proxy. The covered-bond component uses
      Riksbanken/Refinitiv Stadshypotek CAISSE series, not each bank's observed
      internal or issuer-specific funding cost. Variable-rate buckets are
      modeled as longer covered-bond funding swapped into 3M money-market
      exposure, while fixed buckets use covered-bond curve components with
      interpolation between 2Y and 5Y where needed.
    columns:
      - name: bank
        description: Bank name.
        tests:
          - not_null
      - name: period_label
        description: Sortable period label.
        tests:
          - not_null
      - name: list_rate
        description: Latest published listed rate in percent.
      - name: listed_rate_age_days
        description: Age in days of the latest listed-rate scrape for this bank and fixing period.
      - name: listed_rate_freshness
        description: Freshness classification for the latest listed-rate scrape.
        tests:
          - accepted_values:
              values: ['fresh', 'aging', 'stale']
      - name: funding_model
        description: Stylized proxy structure used for the mortgage bucket.
      - name: funding_weight_2y
        description: Weight on the 2Y point when the funding curve is interpolated.
      - name: funding_weight_5y
        description: Weight on the 5Y point when the funding curve is interpolated.
      - name: policy_anchor_component
        description: Policy-rate anchor used for short mortgages.
      - name: short_rate_spread_component
        description: 3M compounded SWESTR spread over the policy rate for short mortgages.
      - name: risk_free_curve_component
        description: Government-bond curve component for fixed-rate funding.
      - name: covered_bond_spread_component
        description: Stadshypotek CAISSE covered-bond market-proxy spread component over the risk-free curve.
      - name: funding_cost
        description: Stylized market funding proxy in percent; not an observed bank-specific funding cost.
      - name: gross_margin
        description: Estimated gross margin in percentage points.

  - name: bank_vs_market_analysis
    description: >
      Listed bank rates versus SCB market-average rates and the same stylized
      Stadshypotek CAISSE mortgage-bond market proxy used in the listed-rate
      margin analysis.
    columns:
      - name: bank
        description: Bank name.
        tests:
          - not_null
      - name: period_label
        description: Sortable period label.
        tests:
          - not_null
      - name: scb_new_loan_rate
        description: SCB average rate for new loans in the mapped bucket.
      - name: listed_rate_age_days
        description: Age in days of the latest listed-rate scrape for this bank and fixing period.
      - name: listed_rate_freshness
        description: Freshness classification for the latest listed-rate scrape.
        tests:
          - accepted_values:
              values: ['fresh', 'aging', 'stale']
      - name: scb_rate_age_days
        description: Age in days of the latest SCB market-average rows for the mapped bucket.
      - name: scb_rate_freshness
        description: Freshness classification for SCB market-average rows in the mapped bucket.
        tests:
          - accepted_values:
              values: ['fresh', 'aging', 'stale']
      - name: effective_margin_new
        description: Estimated effective margin using the SCB new-loan rate.
